services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    env_file:
      - .env.localhost
    environment:
      - POSTGRES_DB=${APP_DB_NAME:-boligoverblik}
      - POSTGRES_USER=${APP_DB_USER:-boligoverblik}
      - POSTGRES_PASSWORD=${APP_DB_PASSWORD:-boligoverblik_local}
    volumes:
      - ${APP_DATA_DIR:-./data}/postgres:/var/lib/postgresql/data
      - ./infra/postgres/init/0000_extensions.sql:/docker-entrypoint-initdb.d/0000_extensions.sql:ro
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${APP_DB_USER:-boligoverblik} -d ${APP_DB_NAME:-boligoverblik} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  app:
    build:
      context: .
    image: ${APP_IMAGE:-boligoverblik-app:dev}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.localhost
    environment:
      - NODE_ENV=production
      - PORT=5000
    ports:
      - "${APP_PORT:-8082}:5000"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
